schema_version: 1

project:
  # Project name used by Base for setup logs and the project virtual
  # environment at ~/.base.d/<project>/.venv.
  name: base

test:
  command: ./bin/base-test

demo:
  script: ./demo/demo.sh
  description: Self-contained walkthrough of Base's core project workflow

release:
  version_file: VERSION
  changelog: CHANGELOG.md
  tag_prefix: v
  github:
    repository: basefoundry/base
    release_title: "Base v{version}"
  homebrew:
    required: true
    tap_repository: basefoundry/homebrew-base
    formula_path: Formula/base.rb
    package: basefoundry/base/base

# Optional relative path to a Homebrew Brewfile for ordinary macOS tools.
# Base runs `brew bundle --file=<path>` during setup when this is set.
# Keep Base-specific managed dependencies in `artifacts`; use Brewfile for
# arbitrary Homebrew formulae and casks that do not need Base intelligence.
# brewfile: Brewfile

artifacts:
  # Artifact declarations are intentionally declarative:
  #   type:    artifact category understood by Base, such as "python-package"
  #            or "tool".
  #   name:    artifact name from Base's registry.
  #   version: requested artifact version. Use "latest" when Base should install
  #            the manager's default/current version.
  #
  # Base chooses the manager from the registry instead of accepting install
  # commands in the manifest. The source of truth for supported (type, name)
  # pairs is cli/python/base_setup/registry.py.
  #
  # python-package artifacts are installed into the project virtual environment:
  #   ~/.base.d/<project>/.venv
  #
  # tool artifacts are currently managed through Homebrew. For Homebrew-managed
  # artifacts, Base currently supports version: latest only. Base reports
  # installed-but-outdated Homebrew packages during check/doctor and upgrades
  # them during setup.
  #
  # Example:
  #   - type: tool
  #     name: terraform
  #     version: latest

  - type: python-package
    name: pylint
    version: latest

  - type: python-package
    name: pytest
    version: latest
